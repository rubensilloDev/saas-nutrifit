<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriFit Systems - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <!-- Iconos de Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <!-- Pantalla completa de autenticación - NutriFit Systems -->
    <div class="auth-wrapper">
        <!-- Elementos decorativos de fondo -->
        <div class="auth-bg-circle auth-bg-circle--1"></div>
        <div class="auth-bg-circle auth-bg-circle--2"></div>

        <!-- Tarjeta de autenticación -->
        <div class="auth-card">
            <!-- Logo y marca -->
            <div class="auth-brand">
                <div class="auth-logo">
                    <img src="img/icono-nutrifit.webp" alt="NutriFit">
                </div>
                <img class="auth-title" src="img/Logo_NutriFit_Systems_.webp" alt="NutriFit Systems">
                <p class="auth-subtitle">Tu plataforma de salud integral</p>
            </div>

            <!-- Sistema de Tabs con CSS Puro -->
            <div class="auth-tabs">
                <!-- Inputs ocultos para controlar los tabs -->
                <input type="radio" name="authTab" id="tabLogin" checked>
                <input type="radio" name="authTab" id="tabRegister">

                <!-- Barra de pestañas (Segmented Control) -->
                <div class="auth-tab-bar">
                    <label for="tabLogin" class="auth-tab-btn">Iniciar Sesión</label>
                    <label for="tabRegister" class="auth-tab-btn">Registrarse</label>
                </div>

                <!-- Contenedor de paneles -->
                <div class="auth-panels">
                    <!-- Panel: Iniciar Sesión -->
                    <div class="auth-panel auth-panel--login">
                        <div class="auth-field">
                            <input type="email" id="loginEmail" class="auth-input" placeholder=" " autocomplete="email">
                            <label for="loginEmail" class="auth-label">Correo electrónico</label>
                        </div>
                        <div class="auth-field">
                            <input type="password" id="loginPass" class="auth-input" placeholder=" " autocomplete="current-password">
                            <label for="loginPass" class="auth-label">Contraseña</label>
                        </div>
                        <div class="auth-options">
                            <a href="#" class="auth-forgot">¿Olvidaste tu contraseña?</a>
                        </div>
                        <button type="submit" class="auth-btn auth-btn--primary">
                            Iniciar Sesión
                            <i class="ri-arrow-right-line"></i>
                        </button>
                    </div>

                    <!-- Panel: Registrarse -->
                    <div class="auth-panel auth-panel--register">
                        <div class="auth-field">
                            <input type="text" id="regName" class="auth-input" placeholder=" " autocomplete="name">
                            <label for="regName" class="auth-label">Nombre completo</label>
                        </div>
                        <div class="auth-field">
                            <input type="email" id="regEmail" class="auth-input" placeholder=" " autocomplete="email">
                            <label for="regEmail" class="auth-label">Correo electrónico</label>
                        </div>
                        <div class="auth-field">
                            <input type="password" id="regPass" class="auth-input" placeholder=" " autocomplete="new-password">
                            <label for="regPass" class="auth-label">Contraseña</label>
                        </div>
                        <div class="auth-field">
                            <input type="password" id="regConfirm" class="auth-input" placeholder=" " autocomplete="new-password">
                            <label for="regConfirm" class="auth-label">Confirmar contraseña</label>
                        </div>
                        <button type="submit" class="auth-btn auth-btn--primary">
                            Crear Cuenta
                            <i class="ri-arrow-right-line"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Divisor -->
            <div class="auth-divider">
                <span>o continúa con</span>
            </div>

            <!-- Botones de inicio social -->
            <div class="auth-social">
                <button class="auth-btn auth-btn--social">
                    <i class="ri-google-fill"></i>
                    Google
                </button>
                <button class="auth-btn auth-btn--social">
                    <i class="ri-apple-fill"></i>
                    Apple
                </button>
            </div>

            <!-- Enlace para entrar sin registrarse -->
            <a href="#" class="auth-skip" id="skip-login">
                Entrar sin registrarse
                <i class="ri-arrow-right-s-line"></i>
            </a>
        </div>
    </div>

    <!-- Modal de selección de rol (aparece tras registrarse) -->
    <div id="role-modal" class="role-modal">
        <div class="role-modal-content">
            <div class="role-modal-header">
                <div class="role-modal-logo">
                    <img src="img/icono-nutrifit.webp" alt="NutriFit">
                </div>
                <h2>¡Cuenta creada con éxito!</h2>
                <p>¿Cómo quieres usar NutriFit Systems?</p>
            </div>
            <div class="role-options">
                <button class="role-card" data-role="profesional">
                    <div class="role-card-icon">
                        <i class="ri-user-star-line"></i>
                    </div>
                    <div class="role-card-info">
                        <span class="role-card-title">Nutricionista / Entrenador</span>
                        <span class="role-card-desc">Gestiona clientes, crea planes y haz seguimiento profesional</span>
                    </div>
                    <i class="ri-arrow-right-s-line role-arrow"></i>
                </button>
                <button class="role-card" data-role="usuario">
                    <div class="role-card-icon" style="background:#e8f5e9;color:var(--primary);">
                        <i class="ri-user-smile-line"></i>
                    </div>
                    <div class="role-card-info">
                        <span class="role-card-title">Usuario</span>
                        <span class="role-card-desc">Registra tus comidas, entrenos y alcanza tus metas personales</span>
                    </div>
                    <i class="ri-arrow-right-s-line role-arrow"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // === ROL SELECTOR: Aparece tras registro o "Entrar sin registrarse" ===
        document.addEventListener('DOMContentLoaded', () => {
            const registerBtn = document.querySelector('.auth-panel--register .auth-btn--primary');
            const skipBtn = document.getElementById('skip-login');
            const roleModal = document.getElementById('role-modal');
            const roleModalTitle = roleModal.querySelector('h2');
            const roleCards = document.querySelectorAll('.role-card');

            function showRoleModal(titleText) {
                roleModalTitle.textContent = titleText;
                roleModal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            registerBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showRoleModal('¡Cuenta creada con éxito!');
            });

            skipBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showRoleModal('Elige tu rol');
            });

            roleCards.forEach(card => {
                card.addEventListener('click', () => {
                    const role = card.dataset.role;
                    localStorage.setItem('nutrifit-role', role);
                    roleModal.classList.remove('active');
                    document.body.style.overflow = '';
                    window.location.href = role === 'profesional'
                        ? 'pages/profesional/dashboard.html'
                        : 'pages/dashboard/index.html';
                });
            });
        });
    </script>
</body>
</html>
