<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Cliente - NutriFit Systems</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/profesional-chat.css">
</head>
<body>
    <div id="sidebar-target"></div>

    <main class="dashboard-container">
        <header class="dashboard-header" style="margin-bottom:0;">
            <div style="display:flex;align-items:center;gap:14px;">
                <a href="clientes.html?mode=chat" class="pro-chat-back"><i class="ri-arrow-left-line"></i></a>
                <div>
                    <h1 style="margin:0;font-size:1.5rem;" id="chat-client-name"><i class="ri-message-3-line" style="color:var(--pro-primary);"></i> Cliente</h1>
                    <p style="margin:2px 0 0 0;font-size:0.85rem;color:var(--on-surface-variant);" id="chat-client-subtitle">Selecciona un cliente desde el listado</p>
                </div>
            </div>
        </header>

        <div class="pro-chat-layout">
            <div class="pro-chat-sidebar" id="chat-clients-sidebar">
                <div class="pro-chat-sidebar-header">
                    <h3>Conversaciones</h3>
                    <span class="pro-chat-count" id="unread-count">0</span>
                </div>
                <div id="chat-clients-list">
                    <!-- Se renderiza dinámicamente -->
                </div>
            </div>

            <div class="pro-chat-main" id="chat-main-area">
                <div class="pro-chat-empty" id="chat-empty-state">
                    <i class="ri-message-3-line"></i>
                    <h3>Selecciona un cliente</h3>
                    <p>Elige una conversación de la lista para empezar a chatear.</p>
                </div>

                <div class="pro-chat-conversation" id="chat-conversation" style="display:none;">
                    <div class="pro-chat-messages" id="chat-messages">
                        <!-- Mensajes dinámicos -->
                    </div>
                    <div class="pro-chat-input-area">
                        <button class="pro-chat-attach"><i class="ri-attachment-line"></i></button>
                        <input type="text" id="chat-input" placeholder="Escribe un mensaje..." autocomplete="off">
                        <button class="pro-chat-send" id="chat-send-btn"><i class="ri-send-plane-fill"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../../src/components/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const clients = [
                { id: 1, name: 'Alex Rivera', goal: 'Hipertrofia', avatar: 'AR', lastMsg: 'Vale, gracias por los ajustes', time: '12:30', unread: 0 },
                { id: 2, name: 'María García', goal: 'Pérdida de peso', avatar: 'MG', lastMsg: '¿Puedo cambiar la cena de hoy?', time: '10:15', unread: 2 },
                { id: 3, name: 'Carlos Mendoza', goal: 'Rendimiento', avatar: 'CM', lastMsg: 'Hoy he mejorado mi marca', time: 'Ayer', unread: 0 },
                { id: 4, name: 'Lucía Fernández', goal: 'Definición', avatar: 'LF', lastMsg: 'Sí, mañana voy al gym', time: 'Ayer', unread: 1 },
                { id: 5, name: 'Sofía Torres', goal: 'Hipertrofia', avatar: 'ST', lastMsg: 'Gracias por la rutina', time: 'Lun', unread: 0 }
            ];

            const messagesDB = {
                1: [
                    { from: 'client', text: 'Buenos días entrenador, he seguido la rutina al pie de la letra', time: '10:00' },
                    { from: 'trainer', text: '¡Excelente Alex! ¿Cómo notaste la intensidad?', time: '10:05' },
                    { from: 'client', text: 'Bien, pero los fondos me costaron un poco', time: '10:12' },
                    { from: 'trainer', text: 'Es normal, iremos subiendo carga progresivamente', time: '10:15' },
                    { from: 'client', text: 'Vale, gracias por los ajustes', time: '12:30' }
                ],
                2: [
                    { from: 'client', text: 'Hola, he tenido hambre toda la semana', time: '09:00' },
                    { from: 'trainer', text: 'Vamos a revisar los macros, quizás necesites más proteína', time: '09:10' },
                    { from: 'client', text: '¿Puedo cambiar la cena de hoy?', time: '10:15' }
                ],
                3: [
                    { from: 'client', text: 'Entrenador, he mejorado mi press banca', time: 'Ayer' },
                    { from: 'client', text: 'Hoy he mejorado mi marca', time: 'Ayer' }
                ],
                4: [
                    { from: 'client', text: 'Mañana entreno aunque sea domingo', time: 'Ayer' },
                    { from: 'client', text: 'Sí, mañana voy al gym', time: 'Ayer' }
                ],
                5: [
                    { from: 'client', text: 'La rutina de piernas está muy buena', time: 'Lun' },
                    { from: 'trainer', text: 'Me alegro, la próxima semana subimos carga', time: 'Lun' },
                    { from: 'client', text: 'Gracias por la rutina', time: 'Lun' }
                ]
            };

            const params = new URLSearchParams(window.location.search);
            const selectedClientId = params.get('cliente') ? parseInt(params.get('cliente')) : null;

            const clientsList = document.getElementById('chat-clients-list');
            const messagesContainer = document.getElementById('chat-messages');
            const conversationArea = document.getElementById('chat-conversation');
            const emptyState = document.getElementById('chat-empty-state');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('chat-send-btn');

            function renderClientsList() {
                const unreadTotal = clients.reduce((sum, c) => sum + c.unread, 0);
                document.getElementById('unread-count').textContent = unreadTotal;

                clientsList.innerHTML = clients.map(c => `
                    <a href="chat-cliente.html?cliente=${c.id}" class="pro-chat-client-item ${c.id === selectedClientId ? 'active' : ''}">
                        <div class="pro-chat-client-avatar">${c.avatar}</div>
                        <div class="pro-chat-client-info">
                            <span class="pro-chat-client-name">${c.name}</span>
                            <span class="pro-chat-client-preview">${c.lastMsg}</span>
                        </div>
                        <div class="pro-chat-client-meta">
                            <span class="pro-chat-client-time">${c.time}</span>
                            ${c.unread > 0 ? `<span class="pro-chat-client-badge">${c.unread}</span>` : ''}
                        </div>
                    </a>
                `).join('');
            }

            function renderConversation(clientId) {
                const client = clients.find(c => c.id === clientId);
                if (!client) return;

                document.getElementById('chat-client-name').innerHTML = `<i class="ri-message-3-line" style="color:var(--pro-primary);"></i> ${client.name}`;
                document.getElementById('chat-client-subtitle').textContent = `${client.goal} · Conversación activa`;
                emptyState.style.display = 'none';
                conversationArea.style.display = 'flex';

                const msgs = messagesDB[clientId] || [];
                messagesContainer.innerHTML = msgs.map(m => `
                    <div class="pro-chat-msg pro-chat-msg--${m.from}">
                        <div class="pro-chat-msg-content">${m.text}</div>
                        <span class="pro-chat-msg-time">${m.time}</span>
                    </div>
                `).join('');
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function sendMessage() {
                const text = chatInput.value.trim();
                if (!text) return;
                if (!selectedClientId) return;

                const msg = document.createElement('div');
                msg.className = 'pro-chat-msg pro-chat-msg--trainer';
                msg.innerHTML = `<div class="pro-chat-msg-content">${text}</div><span class="pro-chat-msg-time">Ahora</span>`;
                messagesContainer.appendChild(msg);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                chatInput.value = '';

                setTimeout(() => {
                    const replies = [
                        'Entendido, lo tendré en cuenta para el próximo ajuste.',
                        'Perfecto, seguimos así. ¿Alguna molestia?',
                        'Anotado. Revisaremos la progresión la próxima semana.',
                        'Gracias por avisarme. Ajustaré tu plan si es necesario.'
                    ];
                    const reply = document.createElement('div');
                    reply.className = 'pro-chat-msg pro-chat-msg--client';
                    reply.innerHTML = `<div class="pro-chat-msg-content">${replies[Math.floor(Math.random() * replies.length)]}</div><span class="pro-chat-msg-time">Ahora</span>`;
                    messagesContainer.appendChild(reply);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }, 1500 + Math.random() * 1000);
            }

            renderClientsList();

            if (selectedClientId) {
                renderConversation(selectedClientId);
            }

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
        });
    </script>
</body>
</html>
